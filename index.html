<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Fret &amp; Grain — Tuner</title>
<link rel="icon" href="data:,">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --wood-dark:#1b1510;
    --brass:#c9a24d;
    --brass-bright:#e6c169;
    --cream:#efe4c9;
    --cream-dim:#a99b7c;
    --flat-sharp:#b1543a;
    --close:#d1a53d;
    --in-tune:#7a9a6a;
    --hairline:rgba(201,162,77,0.18);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    margin:0;
    min-height:100dvh;
    background:
      radial-gradient(ellipse at 50% -10%, rgba(201,162,77,0.08), transparent 55%),
      linear-gradient(180deg, var(--wood-dark), #14100c 85%);
    color:var(--cream);
    font-family:'Inter', system-ui, sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:20px;
    overflow-x:hidden;
    user-select:none;
  }
  header{
    width:100%; max-width:420px;
    display:flex; align-items:baseline; justify-content:space-between;
    padding:14px 2px 22px;
    border-bottom:1px solid var(--hairline);
    margin-bottom:22px;
  }
  .logo{ font-family:'Fraunces', serif; font-weight:700; font-size:22px; }
  .logo span{ color:var(--brass); font-style:italic; font-weight:600; }
  .tuning-label{ font-size:12px; letter-spacing:0.12em; text-transform:uppercase; color:var(--cream-dim); }
  main{ width:100%; max-width:420px; display:flex; flex-direction:column; align-items:center; gap:30px; }
  .pegs{ display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }
  .peg{
    width:46px; height:46px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-family:'Fraunces', serif; font-weight:600; font-size:16px;
    color:var(--cream-dim);
    background:radial-gradient(circle at 32% 28%, #362a1c, #1e1710 72%);
    border:1px solid var(--hairline);
    transition:all .25s ease;
    cursor:pointer;
  }
  .peg:active{ transform:scale(0.94); }
  .peg.active{
    color:#1b1510;
    background:radial-gradient(circle at 32% 28%, var(--brass-bright), var(--brass) 75%);
    border-color:var(--brass-bright);
    box-shadow:0 0 18px rgba(201,162,77,0.45);
    transform:scale(1.08);
  }
  .peg.locked{ box-shadow:0 0 18px rgba(122,154,106,0.55); background:radial-gradient(circle at 32% 28%, #a9c497, var(--in-tune) 75%); }
  .peg.playing{ box-shadow:0 0 0 3px var(--brass-bright); }
  .gauge-wrap{ width:100%; max-width:320px; display:flex; flex-direction:column; align-items:center; gap:22px; }
  .track-outer{ position:relative; width:100%; height:64px; }
  .track-line{ position:absolute; top:50%; left:0; right:0; height:2px; background:rgba(239,228,201,0.1); transform:translateY(-50%); }
  .track-ticks{ position:absolute; top:50%; left:0; right:0; display:flex; justify-content:space-between; transform:translateY(-50%); pointer-events:none; }
  .track-ticks span{ width:1px; height:14px; background:rgba(239,228,201,0.18); }
  .track-ticks span.center{ width:2px; height:26px; background:var(--brass); opacity:0.8; }
  .ball{
    position:absolute; top:50%; left:50%;
    width:34px; height:34px; margin:-17px 0 0 -17px;
    border-radius:50%;
    background:var(--flat-sharp);
    box-shadow:0 0 0 6px rgba(177,84,58,0.15), 0 4px 14px rgba(0,0,0,0.4);
    transition:background .18s ease, box-shadow .18s ease, transform .09s linear;
    will-change:transform;
  }
  .ball.zone-yellow{ background:var(--close); box-shadow:0 0 0 6px rgba(209,165,61,0.18), 0 4px 14px rgba(0,0,0,0.4); }
  .ball.zone-green{ background:var(--in-tune); box-shadow:0 0 0 8px rgba(122,154,106,0.22), 0 4px 18px rgba(0,0,0,0.4); }
  .direction-label{ position:absolute; top:50%; transform:translateY(-50%); font-family:'JetBrains Mono', monospace; font-size:11px; letter-spacing:0.1em; color:var(--cream-dim); text-transform:uppercase; }
  .direction-label.flat{ left:0; }
  .direction-label.sharp{ right:0; }
  .note-readout{ text-align:center; }
  .note-name{ font-family:'Fraunces', serif; font-weight:700; font-size:64px; line-height:1; letter-spacing:-1px; color:var(--cream); transition:color .2s ease; }
  .note-name.zone-green{ color:var(--in-tune); }
  .cents-readout{ font-family:'JetBrains Mono', monospace; font-size:13px; color:var(--cream-dim); margin-top:6px; }
  .status-row{ display:flex; align-items:center; gap:8px; font-family:'JetBrains Mono', monospace; font-size:12px; color:var(--cream-dim); min-height:18px; }
  .dot{ width:6px; height:6px; border-radius:50%; background:var(--cream-dim); }
  .dot.live{ background:var(--brass-bright); box-shadow:0 0 6px var(--brass-bright); animation:pulse 1.4s infinite; }
  @keyframes pulse{ 0%,100%{opacity:1;} 50%{opacity:0.35;} }
  .mic-btn{
    margin-top:6px; width:100%; max-width:280px; padding:16px;
    border-radius:999px; border:1px solid var(--brass); background:transparent;
    color:var(--brass-bright); font-family:'Inter', sans-serif; font-weight:600; font-size:15px;
    display:flex; align-items:center; justify-content:center; gap:10px;
    cursor:pointer; transition:all .2s ease;
  }
  .mic-btn:active{ transform:scale(0.97); }
  .mic-btn.listening{ background:var(--brass); color:#1b1510; box-shadow:0 4px 24px rgba(201,162,77,0.3); }
  .hint{ font-size:11px; color:rgba(169,155,124,0.6); text-align:center; }
  footer{ margin-top:auto; padding-top:24px; font-size:11px; color:rgba(169,155,124,0.5); text-align:center; max-width:320px; line-height:1.5; }
  @media (prefers-reduced-motion: reduce){ .ball, .dot.live{ transition:none; animation:none; } }
</style>
</head>
<body>

<header>
  <div class="logo">fret<span>&amp;</span>grain</div>
  <div class="tuning-label">Standard · 6-String</div>
</header>

<main>
  <div class="pegs" id="pegs"></div>
  <div class="hint">tap a string to hear its reference pitch</div>

  <div class="gauge-wrap">
    <div class="track-outer">
      <div class="direction-label flat">Flat</div>
      <div class="track-line"></div>
      <div class="track-ticks" id="ticks"></div>
      <div class="ball" id="ball"></div>
      <div class="direction-label sharp">Sharp</div>
    </div>
    <div class="note-readout">
      <div class="note-name" id="noteName">–</div>
      <div class="cents-readout" id="centsReadout">play a string to begin</div>
    </div>
  </div>

  <div class="status-row">
    <span class="dot" id="statusDot"></span>
    <span id="statusText">microphone off</span>
  </div>

  <button class="mic-btn" id="micBtn">
    <span>Start Tuning</span>
  </button>
</main>

<footer>
  Autocorrelation pitch detection, runs entirely on-device. No audio is recorded or sent anywhere.
</footer>

<script>
(function(){
  var STRINGS = [
    {note:'E2', freq:82.41, label:'E'},
    {note:'A2', freq:110.00, label:'A'},
    {note:'D3', freq:146.83, label:'D'},
    {note:'G3', freq:196.00, label:'G'},
    {note:'B3', freq:246.94, label:'B'},
    {note:'E4', freq:329.63, label:'E'}
  ];
  var NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];

  var pegsEl = document.getElementById('pegs');
  var ball = document.getElementById('ball');
  var noteNameEl = document.getElementById('noteName');
  var centsEl = document.getElementById('centsReadout');
  var statusDot = document.getElementById('statusDot');
  var statusText = document.getElementById('statusText');
  var micBtn = document.getElementById('micBtn');
  var ticksEl = document.getElementById('ticks');

  STRINGS.forEach(function(s, idx){
    var el = document.createElement('div');
    el.className = 'peg';
    el.textContent = s.label;
    el.dataset.idx = idx;
    el.addEventListener('click', function(){
      playReferenceTone(s.freq, el);
    });
    pegsEl.appendChild(el);
  });
  var pegEls = Array.prototype.slice.call(pegsEl.children);

  for(var c=-50; c<=50; c+=10){
    var tick = document.createElement('span');
    if(c===0) tick.className = 'center';
    ticksEl.appendChild(tick);
  }

  var audioCtx, analyser, mediaStream, rafId;
  var listening = false;
  var wakeLock = null;
  var smoothedFreq = null;

  // --- in-tune chime hold-timer state ---
  var inTuneSince = null;          // timestamp (ms) when the ball first entered the green zone, or null if not currently in it
  var chimeFiredForThisHold = false; // ensures only one chime per continuous in-tune hold
  var HOLD_MS = 200;                // must stay in green, uninterrupted, for this long before the chime fires

  var lastDetectTime = 0;
  var DETECT_INTERVAL = 40; // ms, ~25 updates/sec keeps it responsive without hammering CPU

  // --- reference / confirmation tone playback (separate lightweight context) ---
  var toneCtx;
  function getToneCtx(){
    if(!toneCtx) toneCtx = new (window.AudioContext || window.webkitAudioContext)();
    if(toneCtx.state === 'suspended') toneCtx.resume();
    return toneCtx;
  }
  function playReferenceTone(freq, pegEl){
    var ctx = getToneCtx();
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    var now = ctx.currentTime;
    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(0.28, now + 0.04);
    gain.gain.linearRampToValueAtTime(0.28, now + 1.3);
    gain.gain.linearRampToValueAtTime(0, now + 1.5);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(now);
    osc.stop(now + 1.55);
    if(pegEl){
      pegEl.classList.add('playing');
      setTimeout(function(){ pegEl.classList.remove('playing'); }, 1500);
    }
  }
  function playInTuneChime(){
    var ctx = getToneCtx();
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = 1046.5; // C6, bright confirmation ping
    var now = ctx.currentTime;
    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(0.18, now + 0.02);
    gain.gain.linearRampToValueAtTime(0, now + 0.22);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(now);
    osc.stop(now + 0.25);
  }

  function freqToNote(freq){
    var midi = 69 + 12 * Math.log2(freq/440);
    var rounded = Math.round(midi);
    var cents = Math.round((midi - rounded) * 100);
    var name = NOTE_NAMES[((rounded % 12)+12)%12];
    return {name:name, cents:cents};
  }

  function closestString(freq){
    var best = null, bestDiff = Infinity;
    STRINGS.forEach(function(s,i){
      var diff = Math.abs(freq - s.freq);
      if(diff < bestDiff){ bestDiff = diff; best = i; }
    });
    return best;
  }

  // Autocorrelation restricted to the guitar's practical frequency range (70-450Hz),
  // which is the main performance fix -- previously this scanned the entire buffer's
  // possible lags every frame, which is far more math than the instrument needs.
  var MIN_FREQ = 70, MAX_FREQ = 450;
  function autoCorrelate(buf, sampleRate){
    var SIZE = buf.length;
    var rms = 0;
    for(var i=0;i<SIZE;i++){ rms += buf[i]*buf[i]; }
    rms = Math.sqrt(rms/SIZE);
    if(rms < 0.01) return -1;

    var minLag = Math.max(2, Math.floor(sampleRate / MAX_FREQ));
    var maxLag = Math.min(SIZE - 2, Math.ceil(sampleRate / MIN_FREQ));
    if(maxLag <= minLag) return -1;

    var corrLen = Math.min(SIZE - maxLag, 1536);

    var bestLag = -1, bestCorr = -Infinity;
    var corrs = new Float32Array(maxLag - minLag + 1);
    for(var lag = minLag; lag <= maxLag; lag++){
      var sum = 0;
      for(var j = 0; j < corrLen; j++){
        sum += buf[j] * buf[j+lag];
      }
      corrs[lag - minLag] = sum;
      if(sum > bestCorr){ bestCorr = sum; bestLag = lag; }
    }
    if(bestLag < 0) return -1;

    var idx = bestLag - minLag;
    var x1 = corrs[idx-1] || bestCorr;
    var x2 = corrs[idx];
    var x3 = corrs[idx+1] || bestCorr;
    var a = (x1 + x3 - 2*x2) / 2;
    var b = (x3 - x1) / 2;
    var shift = a ? -b/(2*a) : 0;
    var T0 = bestLag + shift;
    if(T0 <= 0) return -1;
    return sampleRate / T0;
  }

  function getHalfRange(){
    return (ball.parentElement.clientWidth / 2) - 20;
  }

  function updateDisplay(freq, now){
    if(freq < 30 || freq > 1200 || !isFinite(freq)){
      centsEl.textContent = 'listening...';
      // silence / no clear pitch breaks any in-progress hold
      inTuneSince = null;
      chimeFiredForThisHold = false;
      return;
    }

    smoothedFreq = (smoothedFreq === null) ? freq : (smoothedFreq * 0.65 + freq * 0.35);

    var r = freqToNote(smoothedFreq);
    var name = r.name, cents = r.cents;
    var strIdx = closestString(smoothedFreq);
    var absCents = Math.abs(cents);

    pegEls.forEach(function(p,i){
      p.classList.toggle('active', i===strIdx && absCents < 40);
      p.classList.toggle('locked', i===strIdx && absCents <= 5);
    });

    var zone = 'red';
    if(absCents <= 5) zone = 'green';
    else if(absCents <= 20) zone = 'yellow';

    ball.classList.remove('zone-yellow','zone-green');
    if(zone==='yellow') ball.classList.add('zone-yellow');
    if(zone==='green') ball.classList.add('zone-green');
    noteNameEl.classList.toggle('zone-green', zone==='green');

    // --- hold-timer logic for the in-tune chime ---
    if(zone === 'green'){
      if(inTuneSince === null){
        inTuneSince = now;             // just entered the zone, start the clock
        chimeFiredForThisHold = false;
      } else if(!chimeFiredForThisHold && (now - inTuneSince) >= HOLD_MS){
        playInTuneChime();
        chimeFiredForThisHold = true;  // don't fire again until it leaves and re-enters the zone
      }
    } else {
      inTuneSince = null;
      chimeFiredForThisHold = false;
    }

    var clamped = Math.max(-50, Math.min(50, cents));
    var halfRange = getHalfRange();
    var px = (clamped/50) * halfRange;
    ball.style.transform = 'translateX(' + px + 'px)';

    noteNameEl.textContent = name;
    centsEl.textContent = smoothedFreq.toFixed(1) + ' Hz  -  ' + (cents>0?'+':'') + cents + ' cents';
  }

  function requestWakeLock(){
    if('wakeLock' in navigator){
      navigator.wakeLock.request('screen').then(function(lock){
        wakeLock = lock;
      }).catch(function(){ /* unsupported or denied, fail silently */ });
    }
  }
  function releaseWakeLock(){
    if(wakeLock){
      wakeLock.release().catch(function(){});
      wakeLock = null;
    }
  }
  document.addEventListener('visibilitychange', function(){
    if(document.visibilityState === 'hidden'){
      if(listening) stopListening();
    } else if(document.visibilityState === 'visible'){
      if(listening) requestWakeLock();
    }
  });

  function startListening(){
    navigator.mediaDevices.getUserMedia({ audio: {
      echoCancellation:false, noiseSuppression:false, autoGainControl:false
    }}).then(function(stream){
      mediaStream = stream;
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      return audioCtx.resume();
    }).then(function(){
      var source = audioCtx.createMediaStreamSource(mediaStream);
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 2048;
      source.connect(analyser);

      var buf = new Float32Array(analyser.fftSize);
      listening = true;
      smoothedFreq = null;
      inTuneSince = null;
      chimeFiredForThisHold = false;
      statusDot.classList.add('live');
      statusText.textContent = 'listening';
      micBtn.classList.add('listening');
      micBtn.querySelector('span').textContent = 'Stop Tuning';
      requestWakeLock();

      function loop(timestamp){
        if(!listening) return;
        if(timestamp - lastDetectTime >= DETECT_INTERVAL){
          lastDetectTime = timestamp;
          analyser.getFloatTimeDomainData(buf);
          var freq = autoCorrelate(buf, audioCtx.sampleRate);
          updateDisplay(freq, timestamp);
        }
        rafId = requestAnimationFrame(loop);
      }
      rafId = requestAnimationFrame(loop);
    }).catch(function(){
      statusText.textContent = 'mic permission denied';
    });
  }

  function stopListening(){
    listening = false;
    if(rafId) cancelAnimationFrame(rafId);
    if(mediaStream) mediaStream.getTracks().forEach(function(t){ t.stop(); });
    if(audioCtx) audioCtx.close();
    releaseWakeLock();
    inTuneSince = null;
    chimeFiredForThisHold = false;
    statusDot.classList.remove('live');
    statusText.textContent = 'microphone off';
    micBtn.classList.remove('listening');
    micBtn.querySelector('span').textContent = 'Start Tuning';
    noteNameEl.textContent = '-';
    noteNameEl.classList.remove('zone-green');
    centsEl.textContent = 'play a string to begin';
    ball.style.transform = 'translateX(0px)';
    ball.classList.remove('zone-yellow','zone-green');
    pegEls.forEach(function(p){ p.classList.remove('active'); p.classList.remove('locked'); });
  }

  micBtn.addEventListener('click', function(){
    if(listening) stopListening(); else startListening();
  });
})();
</script>

</body>
</html>
